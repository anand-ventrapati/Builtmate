<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 3D Design Generator — ArcaAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="ai-design.css">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-wrapper">
            <a href="index.html" class="logo"><i class='bx bx-cube-alt logo-icon'></i>Arca<span>AI</span></a>
            <ul class="nav-links">
                <li><a href="ai-design.html" class="active-link">AI Design</a></li>
                <li><a href="builders.html">Find Builders</a></li>
                <li><a href="rentals.html">Rentals & PGs</a></li>
                <li><a href="plots.html">Plots</a></li>
            </ul>
        </div>
    </nav>

    <div class="ai-studio">
        <div class="glow-sphere top-left"></div>
        <div class="container studio-container">
            <aside class="studio-sidebar">
                <div class="sidebar-header">
                    <h2>Design <span>Studio</span></h2>
                    <p>Configure your dream architecture</p>
                </div>

                <div class="studio-form">
                    <div class="form-group">
                        <label>Plot Size (sq. yards)</label>
                        <input type="number" id="plot-size" placeholder="e.g. 200">
                    </div>
                    <div class="form-group">
                        <label>House Type</label>
                        <select id="house-type">
                            <option value="modern">Modern Villa</option>
                            <option value="traditional">Traditional Indian</option>
                            <option value="minimalist">Minimalist</option>
                            <option value="contemporary">Contemporary</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bedrooms (BHK)</label>
                        <div class="bhk-selector">
                            <button class="bhk-btn active" data-val="1">1</button>
                            <button class="bhk-btn" data-val="2">2</button>
                            <button class="bhk-btn" data-val="3">3</button>
                            <button class="bhk-btn" data-val="4">4+</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Additional Features</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" checked> Garden</label>
                            <label><input type="checkbox"> Swimming Pool</label>
                            <label><input type="checkbox"> Rooftop Terrace</label>
                            <label><input type="checkbox"> Car Parking</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Voice/Text Prompt</label>
                        <div class="prompt-input">
                            <i class='bx bx-microphone'></i>
                            <textarea id="ai-prompt-studio" placeholder="Describe specific details..."></textarea>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100" id="studio-generate">Generate 3D Design</button>
                </div>
            </aside>

            <main class="studio-viewport">
                <div class="viewport-header">
                    <div class="status-indicator">
                        <span class="pulse"></span> AI Engine Ready
                    </div>
                    <div class="viewport-controls">
                        <button title="Orbit"><i class='bx bx-rotate-right'></i></button>
                        <button title="Zoom"><i class='bx bx-zoom-in'></i></button>
                        <button title="Snapshot"><i class='bx bx-camera'></i></button>
                        <button title="AR Export"><i class='bx bx-mobile-vibration'></i></button>
                    </div>
                </div>

                <div class="canvas-container">
                    <div class="canvas-placeholder" id="canvas-placeholder">
                        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80"
                            alt="Result" class="active-render">
                        <div class="loading-overlay" id="studio-loading">
                            <div class="dna-spinner"></div>
                            <p>Synthesizing Architectural Geometry...</p>
                        </div>
                    </div>
                </div>

                <div class="viewport-footer">
                    <div class="view-tabs">
                        <button class="tab active">Exterior Render</button>
                        <button class="tab">Floor Plan</button>
                        <button class="tab">Interior Visualization</button>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-secondary"><i class='bx bx-download'></i> Save Design</button>
                        <button class="btn btn-primary">Match with Builders</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/ai-design.js"></script>
</body>

</html>
